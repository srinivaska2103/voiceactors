<!DOCTYPE html>
<html lang="en" x-data="authApp()" :class="{ 'dark': darkMode }" :dir="isRtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" 
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z'></path><path d='M19 10v2a7 7 0 0 1-14 0v-2'></path><line x1='12' x2='12' y1='19' y2='22'></line></svg>">
    <title>Simple Login | SonicNarrate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Smooth scrolling for mobile */
        html, body { height: 100%; overflow-y: auto; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7c3aed', 
                        secondary: '#4c1d95',
                        accent: '#c026d3',
                        surface: '#faf5ff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased">

    <header class="sticky top-0 w-full p-4 flex justify-between items-center z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200/50 dark:border-slate-800/50">
        <a href="index.html" class="flex items-center gap-3 group transition-transform hover:scale-[1.02] no-underline">
            <div class="flex-shrink-0 w-9 h-9 lg:w-11 lg:h-11 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/25 transition-all group-hover:bg-secondary">
                <i data-lucide="mic-2" class="w-5 h-5 lg:w-6 lg:h-6"></i>
            </div>
            <span class="text-xl lg:text-2xl font-bold tracking-tight text-primary dark:text-white whitespace-nowrap opacity-100">
                SonicNarrate
            </span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleRtl()" class="px-2 py-1.5 border border-slate-200 dark:border-slate-800 rounded-lg text-[10px] font-bold uppercase hover:bg-white dark:hover:bg-slate-900 transition-all">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>
            <button @click="toggleDark()" class="p-2 border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-white dark:hover:bg-slate-900 transition-all">
                <i x-show="!darkMode" data-lucide="moon" class="w-4 h-4"></i>
                <i x-show="darkMode" data-lucide="sun" class="w-4 h-4 text-orange-400"></i>
            </button>
        </div>
    </header>

    <main class="flex items-center justify-center p-4 py-8 md:py-16">
        <div class="w-full max-w-[400px]">
            
            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-black mb-2 tracking-tight">Log In</h1>
                    <p class="text-sm text-slate-500 dark:text-purple-200/50">Access your voice studio dashboard</p>
                </div>

                <form class="space-y-5" @submit.prevent>
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email</label>
                        <input type="email" placeholder="you@example.com" 
                               class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all text-sm">
                    </div>

                    <div x-data="{ show: false }" class="space-y-1.5">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                        <div class="relative">
                            <input :type="show ? 'text' : 'password'" placeholder="••••••••" 
                                   class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-slate-900 outline-none transition-all text-sm">
                            <button type="button" @click="show = !show" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                <i :data-lucide="show ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-[11px] pt-1 font-bold">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-all">
                            <span class="text-slate-500 group-hover:text-primary transition-colors">Remember me</span>
                        </label>
                        <a href="#" class="text-primary hover:text-secondary transition-colors">Forgot Password?</a>
                    </div>

                    <button class="w-full py-4 bg-primary text-white font-black uppercase tracking-widest rounded-xl shadow-lg shadow-primary/20 hover:bg-secondary transition-all active:scale-95">
                        Log In
                    </button>
                </form>

                <div class="relative flex items-center justify-center my-8">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100 dark:border-slate-800"></div></div>
                    <span class="relative px-4 bg-white dark:bg-slate-900 text-[10px] font-black text-slate-400 uppercase tracking-widest">Or login with</span>
                </div>

                <div class="flex justify-center gap-4 mb-8">
                    <button class="p-3 border border-slate-100 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16">
                            <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
                        </svg>
                    </button>
                    <button class="p-3 border border-slate-100 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-apple" viewBox="0 0 16 16">
                            <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
                        </svg>
                    </button>
                    <button class="p-3 border border-slate-100 dark:border-slate-800 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
                            <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
                        </svg>
                    </button>
                </div>

                <p class="text-center text-xs text-slate-500 dark:text-slate-400 font-medium">
                    Don't have an account? 
                    <a href="regeister.html" class="font-black text-primary hover:text-secondary underline decoration-2 underline-offset-4">Sign Up</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        function authApp() {
            return {
                darkMode: localStorage.getItem('dark-mode') === 'true',
                isRtl: localStorage.getItem('rtl-mode') === 'true',

                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('dark-mode', this.darkMode);
                    document.documentElement.classList.toggle('dark', this.darkMode);
                },

                toggleRtl() {
                    this.isRtl = !this.isRtl;
                    localStorage.setItem('rtl-mode', this.isRtl);
                    document.documentElement.setAttribute('dir', this.isRtl ? 'rtl' : 'ltr');
                },

                init() {
                    lucide.createIcons();
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('dir', this.isRtl ? 'rtl' : 'ltr');
                }
            }
        }
    </script>
</body>
</html>
