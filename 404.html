<!DOCTYPE html>
<html lang="en" x-data="errorPage()" :class="{ 'dark': darkMode }" :dir="isRtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" 
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z'></path><path d='M19 10v2a7 7 0 0 1-14 0v-2'></path><line x1='12' x2='12' y1='19' y2='22'></line></svg>">
    <title>404 - Page Not Found | SonicNarrate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7c3aed',
                        secondary: '#4c1d95',
                        surface: '#faf5ff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased overflow-x-hidden">

    <header class="fixed top-0 left-0 w-full p-4 flex justify-between items-center z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md">
        <a href="index.html" class="flex items-center gap-3 group no-underline">
            <div class="flex-shrink-0 w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/25 transition-all group-hover:bg-secondary">
                <i data-lucide="mic-2" class="w-5 h-5"></i>
            </div>
          <span class="text-xl lg:text-2xl font-bold tracking-tight text-primary dark:text-white whitespace-nowrap opacity-100">
                SonicNarrate
            </span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleRtl()" class="px-3 py-1.5 border border-slate-200 dark:border-slate-800 rounded-lg text-[10px] font-black uppercase hover:bg-white dark:hover:bg-slate-900 transition-all">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>
            <button @click="toggleDark()" class="p-2 border border-slate-200 dark:border-slate-800 rounded-lg hover:bg-white dark:hover:bg-slate-900 transition-all">
                <i x-show="!darkMode" data-lucide="moon" class="w-4 h-4"></i>
                <i x-show="darkMode" data-lucide="sun" class="w-4 h-4 text-orange-400"></i>
            </button>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center p-4 pt-20">
        <div class="max-w-xl w-full text-center space-y-8">
            
            <div class="relative inline-block">
                <h1 class="text-[120px] md:text-[180px] font-black text-slate-200 dark:text-slate-900 leading-none select-none">
                    404
                </h1>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-24 h-24 md:w-32 md:h-32 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center animate-pulse">
                        <i data-lucide="mic-off" class="w-10 h-10 md:w-16 md:h-16 text-primary"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-3xl md:text-4xl font-black text-secondary dark:text-white tracking-tight">
                    Silent Frequency
                </h2>
                <p class="text-slate-500 dark:text-purple-200/50 text-sm md:text-base max-w-sm mx-auto font-medium">
                    The story you're looking for hasn't been narrated yet, or the script has moved to a different booth.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
                <a href="index.html" class="w-full sm:w-auto px-8 py-4 bg-primary text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-lg shadow-primary/30 hover:bg-secondary hover:-translate-y-1 transition-all active:scale-95">
                    Return to Home
                </a>
                <button onclick="history.back()" class="w-full sm:w-auto px-8 py-4 bg-white dark:bg-slate-900 text-secondary dark:text-white font-black uppercase tracking-widest text-xs rounded-2xl border-2 border-slate-100 dark:border-slate-800 hover:border-primary transition-all">
                    Go Back
                </button>
            </div>

            <p class="pt-8 text-xs text-slate-400 font-bold uppercase tracking-widest">
                Need Help? <a href="contact.html" class="text-primary hover:underline">Contact Studio Support</a>
            </p>
        </div>
    </main>

    <script>
        function errorPage() {
            return {
                darkMode: localStorage.getItem('dark-mode') === 'true',
                isRtl: localStorage.getItem('rtl-mode') === 'true',

                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('dark-mode', this.darkMode);
                    document.documentElement.classList.toggle('dark', this.darkMode);
                },

                toggleRtl() {
                    this.isRtl = !this.isRtl;
                    localStorage.setItem('rtl-mode', this.isRtl);
                    document.documentElement.setAttribute('dir', this.isRtl ? 'rtl' : 'ltr');
                },

                init() {
                    lucide.createIcons();
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('dir', this.isRtl ? 'rtl' : 'ltr');
                }
            }
        }
    </script>
</body>
</html>
